<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="icon" type="image/favicon" href="favicon.ico">
</head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="utility.css">

<body>
    <div class="container flex">
        <div class="left bg-grey m-1 round">

            <div class="close">
                <img class="invert" src="images/close.svg" alt="">
            </div>
            <div class="home">
                <img width="120px" class="invert" src="images/logo.svg" alt="">
                <ul>
                    <li><img class="invert" src="images/home.svg" alt="home">home</li>
                    <li><img class="invert" src="images/search.svg" alt="search">search</li>
                </ul>
            </div>
            <div class="sepration"></div>
            <div class="librery bg-grey round">
                <div class="heading p-1 flex ">
                    <img class="invert" src="images/playlist.svg" alt="">
                    <h3>Your librery</h3>
                </div>
                <div id="songs">
                    <ul>

                    </ul>
                </div>
                <div class="footer">
                    <div><a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                </div>
            </div>
        </div>
        <div class="right round m-1">
            <div class="header">
                <div class="nev">

                    <div class="flex">

                        <img width="34px" class="invert hamburger" src="images/hamburger.svg" alt="">

                        <svg class="arrow" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M15 6L9.70711 11.2929C9.37377 11.6262 9.20711 11.7929 9.20711 12C9.20711 12.2071 9.37377 12.3738 9.70711 12.7071L15 18"
                                stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <svg class="arrow" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M9 18L14.2929 12.7071C14.6262 12.3738 14.7929 12.2071 14.7929 12C14.7929 11.7929 14.6262 11.6262 14.2929 11.2929L9 6"
                                stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>
                <div class="buttons">
                    <button class="sign">Sign up</button>
                    <button class="log">Log in</button>
                </div>
            </div>
            <div class="spotifyplaylist">
                <div class="nav2">
                    <h1>Spotify Playlist</h1>
                </div>
                <div class="cards">
                    <div class="card">
                        <div class="play">
                            <svg width="60" height="60" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="12" fill="#1DB954" />
                                <path d="M10 8L16 12L10 16V8Z" fill="black" />
                            </svg>
                        </div>
                        <img src="images/cover.jpg" alt="">
                        <div class="writen">
                            <a href="">Happy Hits</a>
                            <p>hit to boost your mood and fill you with...</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="play">
                            <svg width="60" height="60" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="12" fill="#1DB954" />
                                <path d="M10 8L16 12L10 16V8Z" fill="black" />
                            </svg>
                        </div>
                        <img src="images/ab67616d00001e0220cd43e3df3eb7c506c55d13.jpg" alt="">
                        <div class="writen">
                            <a href="">Happy Hits</a>
                            <p>hit to boost your mood and fill you with...</p>
                        </div>
                    </div>
                </div>
                <div class="playmusic">
                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>
                    <div class="fault">
                        <div class="songinfo">
                        </div>
                        <div class="songbutton">
                            <img id="previes" src="images/previos.svg" alt="">
                            <img id="playss" src="images/play.svg" alt="">
                            <img id="next" src="images/next.svg" alt="">
                        </div>
                        <div class="songtime">

                        </div>
                        <div class="volume invert">
                            <img width="30px" src="images/volume.svg" alt="">
                            <div class="range">
                                <input type="range" name="volume">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
